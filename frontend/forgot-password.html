<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>استعادة كلمة المرور - صحتك</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.rtl.min.css" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

    <link rel="stylesheet" href="css/styles.css">
    <style>
        .auth-page {
            min-height: 100vh;
            background: linear-gradient(135deg, #f8fafc 0%, #e2e8f0 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem 1rem;
        }
        .auth-card {
            background: white;
            border-radius: 1.5rem;
            box-shadow: 0 10px 40px rgba(0,0,0,0.08);
            padding: 2.5rem;
            width: 100%;
            max-width: 420px;
        }
        .auth-logo {
            text-align: center;
            margin-bottom: 2rem;
        }
        .auth-logo .logo-icon {
            width: 60px;
            height: 60px;
            background: linear-gradient(135deg, #1E88E5 0%, #2BB6E6 100%);
            border-radius: 1rem;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 1rem;
        }
        .auth-logo .logo-icon i {
            color: white;
            font-size: 1.75rem;
        }
        .auth-title {
            font-size: 1.5rem;
            font-weight: 700;
            color: #1e293b;
            margin-bottom: 0.5rem;
        }
        .auth-subtitle {
            color: #64748b;
            font-size: 0.9rem;
        }
        .form-floating > .form-control {
            border-radius: 0.75rem;
            border: 2px solid #e2e8f0;
            height: 3.5rem;
            padding-right: 3rem;
        }
        .form-floating > .form-control:focus {
            border-color: #1E88E5;
            box-shadow: 0 0 0 0.25rem rgba(30, 136, 229, 0.1);
        }
        .form-floating > label {
            right: 0;
            padding-right: 3rem;
        }
        .input-icon {
            position: absolute;
            right: 1rem;
            top: 50%;
            transform: translateY(-50%);
            color: #94a3b8;
            z-index: 10;
        }
        .btn-auth {
            background: linear-gradient(135deg, #1E88E5 0%, #2BB6E6 100%);
            border: none;
            border-radius: 0.75rem;
            padding: 0.875rem;
            font-weight: 600;
            color: white;
            width: 100%;
            transition: all 0.2s;
        }
        .btn-auth:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(30, 136, 229, 0.3);
        }
        .btn-auth:disabled {
            opacity: 0.7;
            cursor: not-allowed;
            transform: none;
        }
        .auth-footer {
            text-align: center;
            margin-top: 1.5rem;
            color: #64748b;
            font-size: 0.9rem;
        }
        .auth-footer a {
            color: #1E88E5;
            text-decoration: none;
            font-weight: 600;
        }
        .auth-footer a:hover {
            text-decoration: underline;
        }
        .alert-custom {
            border-radius: 0.75rem;
            border: none;
            padding: 1rem;
            margin-bottom: 1rem;
        }
        .alert-success-custom {
            background: #dcfce7;
            color: #166534;
        }
        .alert-error-custom {
            background: #fee2e2;
            color: #991b1b;
        }
        .spinner-border-sm {
            width: 1rem;
            height: 1rem;
        }
    </style>
<base target="_blank">
</head>
<body>
    <div class="auth-page">
        <div class="auth-card">
            <!-- Logo -->
            <div class="auth-logo">
                <div class="logo-icon">
                    <i class="bi bi-shield-check"></i>
                </div>
                <h1 class="auth-title">استعادة كلمة المرور</h1>
                <p class="auth-subtitle">أدخل بريدك الإلكتروني وسنرسل لك رابطاً لإعادة التعيين</p>
            </div>

            <!-- Alerts -->
            <div id="alertContainer" style="display: none;"></div>

            <!-- Form -->
            <form id="forgotPasswordForm">
                <div class="form-floating position-relative mb-3">
                    <i class="bi bi-envelope input-icon"></i>
                    <input type="email" class="form-control" id="emailInput" placeholder="name@example.com" required>
                    <label for="emailInput">البريد الإلكتروني</label>
                </div>

                <button type="submit" class="btn-auth" id="submitBtn">
                    <span id="btnText">إرسال رابط الاستعادة</span>
                    <span id="btnSpinner" class="spinner-border spinner-border-sm ms-2" style="display: none;"></span>
                </button>
            </form>

            <!-- Footer -->
            <div class="auth-footer">
                <p class="mb-0">
                    <i class="bi bi-arrow-right ms-1"></i>
                    <a href="login.html">العودة لتسجيل الدخول</a>
                </p>
            </div>
        </div>
    </div>

    <script src="js/api.js"></script>
    <script>
        const form = document.getElementById('forgotPasswordForm');
        const emailInput = document.getElementById('emailInput');
        const submitBtn = document.getElementById('submitBtn');
        const btnText = document.getElementById('btnText');
        const btnSpinner = document.getElementById('btnSpinner');
        const alertContainer = document.getElementById('alertContainer');

        function showAlert(message, type = 'success') {
            alertContainer.innerHTML = `
                <div class="alert-custom ${type === 'success' ? 'alert-success-custom' : 'alert-error-custom'}">
                    <i class="bi ${type === 'success' ? 'bi-check-circle' : 'bi-exclamation-circle'} ms-2"></i>
                    ${message}
                </div>
            `;
            alertContainer.style.display = 'block';
        }

        function hideAlert() {
            alertContainer.style.display = 'none';
        }

        function setLoading(loading) {
            submitBtn.disabled = loading;
            btnText.textContent = loading ? 'جاري الإرسال...' : 'إرسال رابط الاستعادة';
            btnSpinner.style.display = loading ? 'inline-block' : 'none';
        }

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            hideAlert();

            const email = emailInput.value.trim();

            if (!email) {
                showAlert('الرجاء إدخال البريد الإلكتروني', 'error');
                return;
            }

            // Simple email validation
            const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            if (!emailRegex.test(email)) {
                showAlert('الرجاء إدخال بريد إلكتروني صحيح', 'error');
                return;
            }

            setLoading(true);

            try {
                // Try API first
                if (typeof api !== 'undefined' && api.forgotPassword) {
                    await api.forgotPassword(email);
                } else {
                    // Fallback: simulate API call
                    await new Promise(resolve => setTimeout(resolve, 1500));
                }

                showAlert('تم إرسال رابط استعادة كلمة المرور إلى بريدك الإلكتروني. الرجاء التحقق من صندوق الوارد.', 'success');
                emailInput.value = '';

                // Disable form after success
                setTimeout(() => {
                    submitBtn.disabled = true;
                    btnText.textContent = 'تم الإرسال';
                }, 500);

            } catch (error) {
                console.error('Forgot password error:', error);

                // Show user-friendly error
                let errorMsg = 'حدث خطأ أثناء الإرسال. الرجاء المحاولة مرة أخرى.';

                if (error.message && error.message.includes('not found')) {
                    errorMsg = 'هذا البريد الإلكتروني غير مسجل في النظام.';
                } else if (error.message && error.message.includes('network')) {
                    errorMsg = 'مشكلة في الاتصال. الرجاء التحقق من الإنترنت.';
                }

                showAlert(errorMsg, 'error');
            } finally {
                setLoading(false);
            }
        });

        // Clear alert on input
        emailInput.addEventListener('input', hideAlert);
    </script>
</body>
</html>
