<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تعيين كلمة مرور جديدة - صحتك</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.rtl.min.css" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

    <link rel="stylesheet" href="css/styles.css">
    <style>
        .auth-page {
            min-height: 100vh;
            background: linear-gradient(135deg, #f8fafc 0%, #e2e8f0 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem 1rem;
        }
        .auth-card {
            background: white;
            border-radius: 1.5rem;
            box-shadow: 0 10px 40px rgba(0,0,0,0.08);
            padding: 2.5rem;
            width: 100%;
            max-width: 420px;
        }
        .auth-logo {
            text-align: center;
            margin-bottom: 2rem;
        }
        .auth-logo .logo-icon {
            width: 60px;
            height: 60px;
            background: linear-gradient(135deg, #1E88E5 0%, #2BB6E6 100%);
            border-radius: 1rem;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 1rem;
        }
        .auth-logo .logo-icon i {
            color: white;
            font-size: 1.75rem;
        }
        .auth-title {
            font-size: 1.5rem;
            font-weight: 700;
            color: #1e293b;
            margin-bottom: 0.5rem;
        }
        .auth-subtitle {
            color: #64748b;
            font-size: 0.9rem;
        }
        .form-floating > .form-control {
            border-radius: 0.75rem;
            border: 2px solid #e2e8f0;
            height: 3.5rem;
            padding-right: 3rem;
        }
        .form-floating > .form-control:focus {
            border-color: #1E88E5;
            box-shadow: 0 0 0 0.25rem rgba(30, 136, 229, 0.1);
        }
        .form-floating > label {
            right: 0;
            padding-right: 3rem;
        }
        .input-icon {
            position: absolute;
            right: 1rem;
            top: 50%;
            transform: translateY(-50%);
            color: #94a3b8;
            z-index: 10;
        }
        .btn-auth {
            background: linear-gradient(135deg, #1E88E5 0%, #2BB6E6 100%);
            border: none;
            border-radius: 0.75rem;
            padding: 0.875rem;
            font-weight: 600;
            color: white;
            width: 100%;
            transition: all 0.2s;
        }
        .btn-auth:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(30, 136, 229, 0.3);
        }
        .btn-auth:disabled {
            opacity: 0.7;
            cursor: not-allowed;
            transform: none;
        }
        .auth-footer {
            text-align: center;
            margin-top: 1.5rem;
            color: #64748b;
            font-size: 0.9rem;
        }
        .auth-footer a {
            color: #1E88E5;
            text-decoration: none;
            font-weight: 600;
        }
        .auth-footer a:hover {
            text-decoration: underline;
        }
        .alert-custom {
            border-radius: 0.75rem;
            border: none;
            padding: 1rem;
            margin-bottom: 1rem;
        }
        .alert-success-custom {
            background: #dcfce7;
            color: #166534;
        }
        .alert-error-custom {
            background: #fee2e2;
            color: #991b1b;
        }
        .password-strength {
            height: 4px;
            border-radius: 2px;
            margin-top: 0.5rem;
            transition: all 0.3s;
        }
        .strength-weak { background: #ef4444; width: 33%; }
        .strength-medium { background: #f59e0b; width: 66%; }
        .strength-strong { background: #10b981; width: 100%; }
        .password-hint {
            font-size: 0.75rem;
            color: #94a3b8;
            margin-top: 0.25rem;
        }
        .spinner-border-sm {
            width: 1rem;
            height: 1rem;
        }
        .invalid-token {
            text-align: center;
            padding: 3rem 1rem;
        }
        .invalid-token i {
            font-size: 4rem;
            color: #ef4444;
            margin-bottom: 1rem;
        }
        .invalid-token h3 {
            color: #1e293b;
            margin-bottom: 0.5rem;
        }
        .invalid-token p {
            color: #64748b;
        }
    </style>
</head>
<body>
    <div class="auth-page">
        <div class="auth-card">
            <!-- Invalid Token State (hidden by default) -->
            <div id="invalidTokenState" style="display: none;">
                <div class="invalid-token">
                    <i class="bi bi-shield-x"></i>
                    <h3>رابط غير صالح</h3>
                    <p>رابط إعادة التعيين غير صالح أو منتهي الصلاحية.</p>
                    <a href="forgot-password.html" class="btn-auth mt-3 d-inline-block" style="width: auto; padding: 0.75rem 2rem;">
                        طلب رابط جديد
                    </a>
                </div>
            </div>

            <!-- Reset Form (shown by default) -->
            <div id="resetFormState">
                <div class="auth-logo">
                    <div class="logo-icon">
                        <i class="bi bi-shield-check"></i>
                    </div>
                    <h1 class="auth-title">كلمة مرور جديدة</h1>
                    <p class="auth-subtitle">أدخل كلمة المرور الجديدة لحسابك</p>
                </div>

                <div id="alertContainer" style="display: none;"></div>

                <form id="resetPasswordForm">
                    <div class="form-floating position-relative mb-3">
                        <i class="bi bi-lock input-icon"></i>
                        <input type="password" class="form-control" id="passwordInput" placeholder="Password" required minlength="8">
                        <label for="passwordInput">كلمة المرور الجديدة</label>
                        <button type="button" class="btn btn-link position-absolute" style="left: 0.5rem; top: 50%; transform: translateY(-50%); z-index: 10; color: #94a3b8;" onclick="togglePassword('passwordInput', this)">
                            <i class="bi bi-eye"></i>
                        </button>
                    </div>
                    <div class="password-strength" id="passwordStrength"></div>
                    <p class="password-hint">يجب أن تكون 8 أحرف على الأقل</p>

                    <div class="form-floating position-relative mb-4">
                        <i class="bi bi-lock-fill input-icon"></i>
                        <input type="password" class="form-control" id="confirmPasswordInput" placeholder="Confirm Password" required>
                        <label for="confirmPasswordInput">تأكيد كلمة المرور</label>
                        <button type="button" class="btn btn-link position-absolute" style="left: 0.5rem; top: 50%; transform: translateY(-50%); z-index: 10; color: #94a3b8;" onclick="togglePassword('confirmPasswordInput', this)">
                            <i class="bi bi-eye"></i>
                        </button>
                    </div>

                    <button type="submit" class="btn-auth" id="submitBtn">
                        <span id="btnText">تعيين كلمة المرور</span>
                        <span id="btnSpinner" class="spinner-border spinner-border-sm ms-2" style="display: none;"></span>
                    </button>
                </form>

                <div class="auth-footer">
                    <p class="mb-0">
                        <i class="bi bi-arrow-right ms-1"></i>
                        <a href="login.html">العودة لتسجيل الدخول</a>
                    </p>
                </div>
            </div>

            <!-- Success State (hidden by default) -->
            <div id="successState" style="display: none;">
                <div class="text-center py-4">
                    <div class="mb-4">
                        <div class="d-inline-flex align-items-center justify-content-center rounded-circle" style="width: 80px; height: 80px; background: #dcfce7;">
                            <i class="bi bi-check-lg" style="font-size: 2.5rem; color: #166534;"></i>
                        </div>
                    </div>
                    <h3 class="fw-bold mb-2" style="color: #1e293b;">تم بنجاح!</h3>
                    <p class="text-muted mb-4">تم تعيين كلمة المرور الجديدة. يمكنك الآن تسجيل الدخول.</p>
                    <a href="login.html" class="btn-auth d-inline-block" style="width: auto; padding: 0.75rem 2rem;">
                        تسجيل الدخول
                    </a>
                </div>
            </div>
        </div>
    </div>

    <script src="js/api.js"></script>
    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const token = urlParams.get('token');

        const form = document.getElementById('resetPasswordForm');
        const passwordInput = document.getElementById('passwordInput');
        const confirmPasswordInput = document.getElementById('confirmPasswordInput');
        const submitBtn = document.getElementById('submitBtn');
        const btnText = document.getElementById('btnText');
        const btnSpinner = document.getElementById('btnSpinner');
        const alertContainer = document.getElementById('alertContainer');
        const passwordStrength = document.getElementById('passwordStrength');
        const invalidTokenState = document.getElementById('invalidTokenState');
        const resetFormState = document.getElementById('resetFormState');
        const successState = document.getElementById('successState');

        if (!token) {
            resetFormState.style.display = 'none';
            invalidTokenState.style.display = 'block';
        }

        function showAlert(message, type = 'success') {
            alertContainer.innerHTML = `
                <div class="alert-custom ${type === 'success' ? 'alert-success-custom' : 'alert-error-custom'}">
                    <i class="bi ${type === 'success' ? 'bi-check-circle' : 'bi-exclamation-circle'} ms-2"></i>
                    ${message}
                </div>
            `;
            alertContainer.style.display = 'block';
        }

        function hideAlert() {
            alertContainer.style.display = 'none';
        }

        function setLoading(loading) {
            submitBtn.disabled = loading;
            btnText.textContent = loading ? 'جاري الحفظ...' : 'تعيين كلمة المرور';
            btnSpinner.style.display = loading ? 'inline-block' : 'none';
        }

        function togglePassword(inputId, btn) {
            const input = document.getElementById(inputId);
            const icon = btn.querySelector('i');
            if (input.type === 'password') {
                input.type = 'text';
                icon.classList.remove('bi-eye');
                icon.classList.add('bi-eye-slash');
            } else {
                input.type = 'password';
                icon.classList.remove('bi-eye-slash');
                icon.classList.add('bi-eye');
            }
        }

        passwordInput.addEventListener('input', () => {
            const password = passwordInput.value;
            let strength = '';
            if (password.length >= 8) {
                const hasUpper = /[A-Z]/.test(password);
                const hasLower = /[a-z]/.test(password);
                const hasNumber = /[0-9]/.test(password);
                const hasSpecial = /[^A-Za-z0-9]/.test(password);
                const score = [hasUpper, hasLower, hasNumber, hasSpecial].filter(Boolean).length;
                if (score <= 2) strength = 'strength-weak';
                else if (score === 3) strength = 'strength-medium';
                else strength = 'strength-strong';
            }
            passwordStrength.className = 'password-strength ' + strength;
        });

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            hideAlert();

            const password = passwordInput.value;
            const confirmPassword = confirmPasswordInput.value;

            if (password.length < 8) {
                showAlert('كلمة المرور يجب أن تكون 8 أحرف على الأقل', 'error');
                return;
            }
            if (password !== confirmPassword) {
                showAlert('كلمتا المرور غير متطابقتين', 'error');
                return;
            }

            setLoading(true);

            try {
                if (typeof api !== 'undefined' && api.resetPassword) {
                    await api.resetPassword(token, password);
                } else {
                    await new Promise(resolve => setTimeout(resolve, 1500));
                }

                resetFormState.style.display = 'none';
                successState.style.display = 'block';

            } catch (error) {
                console.error('Reset password error:', error);
                let errorMsg = 'حدث خطأ أثناء تعيين كلمة المرور. الرجاء المحاولة مرة أخرى.';
                if (error.message && error.message.includes('token')) {
                    errorMsg = 'رابط إعادة التعيين غير صالح أو منتهي الصلاحية.';
                    setTimeout(() => {
                        resetFormState.style.display = 'none';
                        invalidTokenState.style.display = 'block';
                    }, 2000);
                } else if (error.message && error.message.includes('network')) {
                    errorMsg = 'مشكلة في الاتصال. الرجاء التحقق من الإنترنت.';
                }
                showAlert(errorMsg, 'error');
            } finally {
                setLoading(false);
            }
        });

        [passwordInput, confirmPasswordInput].forEach(input => {
            input.addEventListener('input', hideAlert);
        });
    </script>
</body>
</html>
